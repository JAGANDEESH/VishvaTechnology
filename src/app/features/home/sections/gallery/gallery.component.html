<section id="gallery" class="gallery section light-background">
  <div class="container-fluid" data-aos="fade-up" data-aos-delay="100">
    <div class="section-title" data-aos="fade-up">
      <h2>Our Work</h2>
      <p>A glimpse of the products and interfaces we've crafted for our clients.</p>
    </div>

    <div class="row" style="margin:0;">
      <div class="col-lg-3 col-md-4 gallery-item" *ngFor="let img of images; let i = index"
           data-aos="fade-up" [attr.data-aos-delay]="(i%4+1)*100"
           style="padding:0;">
        <a [href]="img" class="glightbox" [attr.data-gallery]="'images-gallery'">
          <img [src]="img" [alt]="'Portfolio work ' + (i+1)" class="img-fluid" style="width:100%; height:260px; object-fit:cover;">
        </a>
      </div>
    </div>
  </div>
</section>
